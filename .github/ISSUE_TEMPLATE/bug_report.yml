name: Bug report
description: Something is not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options:
        - Discord
        - Telegram
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/newride`
        2. Click "Join"
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `docker compose logs --tail=100 bot` and paste any relevant output.
      render: text

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.3.0 or the Docker image tag
    validations:
      required: true
