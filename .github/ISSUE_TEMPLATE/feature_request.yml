name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the problem or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to see implemented.
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Which adapter(s) does this affect?
      multiple: true
      options:
        - Discord
        - Telegram
        - Both
        - Neither (core / infra)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought about?
