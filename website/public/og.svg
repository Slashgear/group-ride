<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-grd" cx="25%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#1a1f3c"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5865F2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5865F2" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <rect width="1200" height="630" fill="url(#bg-grd)"/>

  <!-- Glow blob right -->
  <ellipse cx="980" cy="315" rx="320" ry="260" fill="url(#glow)" clip-path="url(#clip)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#5865F2"/>

  <!-- Badge pill -->
  <rect x="80" y="108" width="310" height="34" rx="17"
        fill="none" stroke="#5865F2" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="102" y="130" fill="#a8b3f8"
        font-size="15" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        letter-spacing="0.04em">Discord &amp; Telegram · open-source</text>

  <!-- Main title -->
  <text x="80" y="265"
        font-size="110" font-weight="800" letter-spacing="-3"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
    <tspan fill="white">group-</tspan><tspan fill="#5865F2">ride</tspan>
  </text>

  <!-- Taglines -->
  <text x="80" y="320" fill="#7c7f85" font-size="26"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
    Organisez vos sorties vélo, sans le bazar.
  </text>
  <text x="80" y="358" fill="#4a4d55" font-size="22"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
    Organise your cycling rides, without the chaos.
  </text>

  <!-- Before card -->
  <rect x="80" y="415" width="440" height="88" rx="8" fill="#2b2d31"/>
  <rect x="80" y="415" width="440" height="88" rx="8" fill="none"
        stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Channel label -->
  <text x="100" y="441" fill="#A3A6AA" font-size="12"
        font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.02em"># sorties</text>
  <!-- Fake messages -->
  <text x="100" y="462" fill="#DCDDDE" font-size="13"
        font-family="system-ui,-apple-system,sans-serif">
    Pierre: Sortie samedi ? 8h ? 9h ?
  </text>
  <text x="100" y="480" fill="#DCDDDE" font-size="13"
        font-family="system-ui,-apple-system,sans-serif">
    Kevin: J'ai un vélo à vendre au fait 😄
  </text>
  <text x="100" y="498" fill="#A3A6AA" font-size="12"
        font-family="system-ui,-apple-system,sans-serif">
    +18 messages...
  </text>
  <!-- Notification badge -->
  <rect x="476" y="419" width="28" height="18" rx="9" fill="#ED4245"/>
  <text x="490" y="432" fill="white" font-size="11" font-weight="700"
        font-family="system-ui,sans-serif" text-anchor="middle">21</text>

  <!-- Arrow -->
  <text x="551" y="465" fill="#5865F2" font-size="40"
        font-family="system-ui,sans-serif">→</text>

  <!-- After card -->
  <rect x="620" y="415" width="480" height="88" rx="8" fill="#2b2d31"/>
  <rect x="620" y="415" width="4" height="88" rx="2" fill="#5865F2"/>
  <rect x="620" y="415" width="480" height="88" rx="8" fill="none"
        stroke="#5865F2" stroke-opacity="0.25" stroke-width="1"/>
  <text x="643" y="438" fill="#A3A6AA" font-size="12"
        font-family="system-ui,-apple-system,sans-serif">🤖 group-ride  BOT</text>
  <text x="643" y="459" fill="#a8b3f8" font-size="14" font-weight="600"
        font-family="system-ui,-apple-system,sans-serif">
    Boucle des Crêtes — Samedi 31 mai
  </text>
  <text x="643" y="477" fill="#DCDDDE" font-size="13"
        font-family="system-ui,-apple-system,sans-serif">⏰ 8h30  ·  📍 Parking Leclerc  ·  80 km</text>
  <text x="643" y="495" fill="#57f287" font-size="12"
        font-family="system-ui,-apple-system,sans-serif">✅ Pierre  ✅ Marie  ✅ Thomas  ✅ Kevin</text>

  <!-- Footer URL -->
  <text x="80" y="596" fill="#2e3137" font-size="15"
        font-family="system-ui,-apple-system,sans-serif">
    github.com/Slashgear/group-ride
  </text>
</svg>
